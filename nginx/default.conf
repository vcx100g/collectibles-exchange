server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the generated metadata + images from a separate (non-nested) mount.
    location /metadata/ {
        alias /srv/metadata/;
        add_header Access-Control-Allow-Origin *;
        types {
            application/json json;
            image/svg+xml    svg;
        }
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
