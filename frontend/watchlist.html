<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VaultX — Watchlist</title>
  <meta name="description" content="Your saved collectibles on VaultX." />
  <link rel="icon" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/theme.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg border-bottom border-secondary-subtle mb-3">
    <div class="container">
      <a class="navbar-brand fs-4" href="/"><span class="brand-badge">VaultX</span></a>
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <span id="nav-links" class="d-flex gap-2 flex-wrap"></span>
        <span id="net-badge" class="badge text-bg-secondary d-none"></span>
        <button id="connect-btn" class="btn btn-primary">Connect Wallet</button>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    <div class="mb-3">
      <h1 class="h4 m-0">♥ Watchlist</h1>
      <div class="text-secondary small">Items you’ve saved. Stored in this browser, per connected account.</div>
    </div>

    <div id="wl-grid" class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-3"></div>
    <div id="wl-empty" class="d-none">
      <div class="text-center text-secondary py-5">
        <div class="display-6 mb-2">♡</div>
        <div class="fw-semibold text-body">Your watchlist is empty</div>
        <div class="small mb-3">Tap the heart on any item to save it here.</div>
        <a href="/search.html" class="btn btn-primary">Browse items</a>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <div class="modal fade" id="detail-modal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content" id="detail-content"></div></div>
  </div>
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toasts" aria-live="polite" aria-atomic="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./shell.js"></script>
  <script type="module" src="./watchlist.js"></script>
</body>
</html>
