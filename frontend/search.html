<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VaultX — Search</title>
  <meta name="description" content="Search and filter 1-of-1 collectibles on VaultX by category, attributes and price." />
  <meta property="og:title" content="VaultX — Search" />
  <meta property="og:description" content="Browse and filter collectibles by category, attributes and price." />
  <meta property="og:image" content="/favicon.svg" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/theme.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg border-bottom border-secondary-subtle mb-3">
    <div class="container">
      <a class="navbar-brand fs-4" href="/"><span class="brand-badge">VaultX</span></a>
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <span id="nav-links" class="d-flex gap-2 flex-wrap"></span>
        <span id="net-badge" class="badge text-bg-secondary d-none"></span>
        <button id="connect-btn" class="btn btn-primary">Connect Wallet</button>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    <button class="btn btn-outline-light w-100 mb-3 d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#filters-oc">⚙ Filters &amp; sort</button>
    <div class="row g-3">
      <!-- left: filters (offcanvas drawer on mobile, static sidebar on desktop) -->
      <div class="col-lg-3">
        <div class="offcanvas-lg offcanvas-start" tabindex="-1" id="filters-oc" aria-labelledby="filters-oc-label">
          <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="filters-oc-label">Filters</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#filters-oc"></button>
          </div>
          <div class="offcanvas-body p-3 p-lg-0">
        <div class="card position-sticky w-100" style="top:1rem">
          <div class="card-body">
            <h6 class="mb-3 d-none d-lg-block">Filters</h6>
            <input id="f-text" class="form-control form-control-sm mb-3" placeholder="Search by name…" />
            <div class="mb-3">
              <div class="small text-secondary mb-1">Category</div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="cat-Card"><label class="form-check-label" for="cat-Card">🃏 Cards</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="cat-Painting"><label class="form-check-label" for="cat-Painting">🖼️ Paintings</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="cat-Wine"><label class="form-check-label" for="cat-Wine">🍷 Wine</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="cat-Farm"><label class="form-check-label" for="cat-Farm">🌾 Farm</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="cat-Art"><label class="form-check-label" for="cat-Art">🎨 Art</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="cat-Antique"><label class="form-check-label" for="cat-Antique">🏺 Antiques</label></div>
            </div>
            <div id="attr-filters"></div>
            <div class="mb-3">
              <div class="small text-secondary mb-1">Price (ETH)</div>
              <div class="input-group input-group-sm">
                <input id="f-min" type="number" step="0.01" min="0" class="form-control" placeholder="min" />
                <span class="input-group-text">–</span>
                <input id="f-max" type="number" step="0.01" min="0" class="form-control" placeholder="max" />
              </div>
            </div>
            <div class="mb-3">
              <div class="small text-secondary mb-1">Sort</div>
              <select id="f-sort" class="form-select form-select-sm">
                <option value="newest">Newest</option>
                <option value="price-asc">Price: low → high</option>
                <option value="price-desc">Price: high → low</option>
              </select>
            </div>
            <button id="reset-btn" class="btn btn-sm btn-outline-secondary w-100">Reset filters</button>
          </div>
        </div>
          </div>
        </div>
      </div>

      <!-- right: results -->
      <div class="col-lg-9">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-2 gap-2">
          <span id="result-count" class="text-secondary small">…</span>
          <div class="d-flex align-items-center gap-2">
            <button id="prev-btn" class="btn btn-sm btn-outline-light" disabled>‹ Prev</button>
            <span id="page-info" class="small text-secondary">Page 1 / 1</span>
            <button id="next-btn" class="btn btn-sm btn-outline-light" disabled>Next ›</button>
          </div>
        </div>
        <div id="results" class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-3"></div>
        <p id="no-results" class="text-secondary text-center py-5 d-none">No items match your filters.</p>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <div class="modal fade" id="detail-modal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content" id="detail-content"></div></div>
  </div>
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toasts" aria-live="polite" aria-atomic="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./shell.js"></script>
  <script type="module" src="./search.js"></script>
</body>
</html>
