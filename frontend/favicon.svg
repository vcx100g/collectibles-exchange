<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="VaultX">
  <defs>
    <linearGradient id="vx" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b2ff7"/>
      <stop offset="1" stop-color="#2d9cdb"/>
    </linearGradient>
  </defs>
  <!-- vault door -->
  <rect x="6" y="6" width="52" height="52" rx="13" fill="#0c0e14"/>
  <rect x="6" y="6" width="52" height="52" rx="13" fill="none" stroke="url(#vx)" stroke-width="3"/>
  <!-- bold X formed by two strokes -->
  <path d="M22 22 L42 42 M42 22 L22 42" fill="none" stroke="url(#vx)" stroke-width="6" stroke-linecap="round"/>
  <!-- vault dial dots -->
  <circle cx="32" cy="32" r="2.6" fill="#0c0e14" stroke="url(#vx)" stroke-width="1.6"/>
</svg>
