<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VaultX — Profile</title>
  <meta name="description" content="A trader's public profile on VaultX — items owned, listings, sales and activity." />
  <meta property="og:title" content="VaultX — Profile" />
  <meta property="og:image" content="/favicon.svg" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/theme.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg border-bottom border-secondary-subtle mb-3">
    <div class="container">
      <a class="navbar-brand fs-4" href="/"><span class="brand-badge">VaultX</span></a>
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <span id="nav-links" class="d-flex gap-2 flex-wrap"></span>
        <span id="net-badge" class="badge text-bg-secondary d-none"></span>
        <button id="connect-btn" class="btn btn-primary">Connect Wallet</button>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    <div id="loading" class="text-center py-5"><div class="spinner-border text-secondary"></div></div>

    <div id="content" class="d-none">
      <!-- profile header -->
      <div class="card mb-3"><div class="card-body d-flex flex-wrap align-items-center gap-3">
        <span id="p-identicon"></span>
        <div class="me-auto">
          <div class="mono fs-5" id="p-addr">—</div>
          <div class="small text-secondary"><span id="p-you" class="badge text-bg-success d-none">✓ This is you</span></div>
        </div>
        <button id="copy-addr" class="btn btn-sm btn-outline-light">⧉ Copy address</button>
      </div></div>

      <!-- stat tiles -->
      <div id="p-stats" class="row row-cols-2 row-cols-md-3 row-cols-lg-6 g-2 mb-4"></div>

      <!-- listed for sale -->
      <h2 class="h5 mb-2">🏷️ Listed for sale</h2>
      <div id="p-listed" class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-3 mb-2"></div>
      <p id="p-listed-empty" class="text-secondary small d-none mb-4">No active listings.</p>

      <!-- owned -->
      <h2 class="h5 mt-3 mb-2">📦 Owned items</h2>
      <div id="p-owned" class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-3 mb-2"></div>
      <p id="p-owned-empty" class="text-secondary small d-none mb-4">Doesn't own any items.</p>

      <!-- activity -->
      <h2 class="h5 mt-4 mb-2">📜 Activity</h2>
      <div class="card"><div class="card-body">
        <div class="table-responsive"><table class="table table-sm align-middle">
          <thead><tr><th>Event</th><th>Item</th><th>From</th><th>To</th><th>Price</th><th>Time</th></tr></thead>
          <tbody id="p-activity"></tbody>
        </table></div>
      </div></div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <div class="modal fade" id="detail-modal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content" id="detail-content"></div></div>
  </div>
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toasts" aria-live="polite" aria-atomic="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./shell.js"></script>
  <script type="module" src="./profile.js"></script>
</body>
</html>
