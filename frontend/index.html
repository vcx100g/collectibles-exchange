<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VaultX — Collectibles</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: radial-gradient(1200px 600px at 50% -10%, #1b2030, #0c0e14); min-height: 100vh; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .brand-badge { background: linear-gradient(135deg,#7b2ff7,#2d9cdb); -webkit-background-clip:text; background-clip:text; color:transparent; font-weight:800; }
    .card-art { aspect-ratio: 1/1; width: 100%; object-fit: cover; background: #11131a; }
    .art-wrap { position: relative; aspect-ratio: 1/1; width: 100%; overflow: hidden;
      background-image: linear-gradient(110deg, #161922 8%, #20242f 18%, #161922 33%);
      background-size: 200% 100%; animation: shimmer 1.4s linear infinite; }
    .tile-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity .45s ease; }
    .tile-img.loaded { opacity: 1; }
    @keyframes shimmer { to { background-position-x: -200%; } }
    .trait { font-size: .72rem; }
    .timeline { list-style: none; padding-left: 0; }
    .timeline li { border-left: 2px solid var(--bs-border-color); padding: 0 0 1rem 1rem; position: relative; }
    .timeline li::before { content:""; position:absolute; left:-6px; top:4px; width:10px; height:10px; border-radius:50%; background: var(--bs-primary); }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg border-bottom border-secondary-subtle mb-3">
    <div class="container">
      <a class="navbar-brand fs-4" href="/"><span class="brand-badge">VaultX</span></a>
      <div class="d-flex align-items-center gap-2">
        <a href="/" class="btn btn-sm btn-light">Home</a>
        <a href="/search.html" class="btn btn-sm btn-outline-light">🔍 Search</a>
        <a href="/dashboard.html" class="btn btn-sm btn-outline-light">My Account</a>
        <span id="net-badge" class="badge text-bg-secondary d-none"></span>
        <button id="connect-btn" class="btn btn-primary">Connect Wallet</button>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    <div class="text-center py-3 mb-2">
      <h1 class="h3 mb-1"><span class="brand-badge">VaultX</span> Collectibles</h1>
      <p class="text-secondary mb-3">Cards · Art · Wine · Farm · Antiques — traded with test ETH</p>
      <a href="/search.html" class="btn btn-lg btn-primary">🔍 Browse &amp; search all items</a>
    </div>

    <section class="mb-4">
      <div id="market-stats" class="row g-2 mb-3"></div>
      <div class="card"><div class="card-body">
        <h2 class="h6 mb-1">📊 Market overview <span class="text-secondary small fw-normal">— sales &amp; cumulative volume</span></h2>
        <div style="height:240px"><canvas id="market-chart"></canvas></div>
        <div id="market-empty" class="text-secondary small d-none py-5 text-center">No sales yet.</div>
      </div></div>
    </section>

    <section class="mb-4">
      <div class="d-flex justify-content-between align-items-end mb-2">
        <h2 class="h5 m-0">🔥 Latest Trades</h2>
        <a href="/search.html" class="small text-secondary text-decoration-none">browse all →</a>
      </div>
      <div id="sec-latest" class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3"></div>
    </section>

    <section class="mb-4">
      <div class="d-flex justify-content-between align-items-end mb-2">
        <h2 class="h5 m-0">💎 Most Valued</h2>
        <a href="/search.html?sort=price-desc" class="small text-secondary text-decoration-none">browse all →</a>
      </div>
      <div id="sec-valued" class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3"></div>
    </section>

    <section class="mb-4">
      <div class="d-flex justify-content-between align-items-end mb-2">
        <h2 class="h5 m-0">📈 Most Traded</h2>
        <a href="/search.html" class="small text-secondary text-decoration-none">browse all →</a>
      </div>
      <div id="sec-traded" class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3"></div>
    </section>
  </main>

  <div class="modal fade" id="detail-modal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content" id="detail-content"></div></div>
  </div>
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toasts"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./home.js"></script>
</body>
</html>
