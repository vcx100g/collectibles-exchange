<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VaultX — Collectibles Exchange</title>
  <meta name="description" content="VaultX — a non-custodial marketplace for 1-of-1 collectibles: cards, art, wine, farm goods & antiques." />
  <meta property="og:title" content="VaultX — Collectibles Exchange" />
  <meta property="og:description" content="Trade 1-of-1 collectibles on-chain with creator royalties. Cards · Art · Wine · Farm · Antiques." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/favicon.svg" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/theme.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg border-bottom border-secondary-subtle mb-3">
    <div class="container">
      <a class="navbar-brand fs-4" href="/"><span class="brand-badge">VaultX</span></a>
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <span id="nav-links" class="d-flex gap-2 flex-wrap"></span>
        <span id="net-badge" class="badge text-bg-secondary d-none"></span>
        <button id="connect-btn" class="btn btn-primary">Connect Wallet</button>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    <div class="text-center py-3 mb-2">
      <h1 class="h3 mb-1"><span class="brand-badge">VaultX</span> Collectibles</h1>
      <p class="text-secondary mb-3">Cards · Art · Wine · Farm · Antiques — traded with test ETH</p>
      <a href="/search.html" class="btn btn-lg btn-primary">🔍 Browse &amp; search all items</a>
    </div>

    <section class="mb-4">
      <div id="market-stats" class="row g-2 mb-3"></div>
      <div class="card"><div class="card-body">
        <h2 class="h6 mb-1">📊 Market overview <span class="text-secondary small fw-normal">— sales &amp; cumulative volume</span></h2>
        <div class="position-relative" style="height:240px"><canvas id="market-chart"></canvas></div>
        <div id="market-empty" class="text-secondary small d-none py-5 text-center">No sales yet.</div>
      </div></div>
    </section>

    <section class="mb-4">
      <div class="d-flex justify-content-between align-items-end mb-2">
        <h2 class="h5 m-0">🔥 Latest Trades</h2>
        <a href="/search.html" class="small text-secondary text-decoration-none">browse all →</a>
      </div>
      <div id="sec-latest" class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3"></div>
    </section>

    <section class="mb-4">
      <div class="d-flex justify-content-between align-items-end mb-2">
        <h2 class="h5 m-0">💎 Most Valued</h2>
        <a href="/search.html?sort=price-desc" class="small text-secondary text-decoration-none">browse all →</a>
      </div>
      <div id="sec-valued" class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3"></div>
    </section>

    <section class="mb-4">
      <div class="d-flex justify-content-between align-items-end mb-2">
        <h2 class="h5 m-0">📈 Most Traded</h2>
        <a href="/search.html" class="small text-secondary text-decoration-none">browse all →</a>
      </div>
      <div id="sec-traded" class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3"></div>
    </section>

    <section id="sec-recent-wrap" class="mb-4 d-none">
      <div class="d-flex justify-content-between align-items-end mb-2">
        <h2 class="h5 m-0">🕘 Recently viewed</h2>
      </div>
      <div id="sec-recent" class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3"></div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <div class="modal fade" id="detail-modal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content" id="detail-content"></div></div>
  </div>
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toasts" aria-live="polite" aria-atomic="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./shell.js"></script>
  <script type="module" src="./home.js"></script>
</body>
</html>
