# Docker-first dev workspace for the collectibles exchange.
#   - hardhat : Node 22, runs all hardhat tasks + the local dev chain (port 8545)
#   - web     : nginx, serves the static frontend + metadata (port 8080)
#
# node_modules lives in a NAMED VOLUME (never bind-mounted to the host).
#
# Common commands:
#   docker compose run --rm hardhat npm install
#   docker compose run --rm hardhat npm run compile
#   docker compose run --rm hardhat npm test
#   docker compose up -d hardhat                 # start the local chain
#   docker compose exec hardhat npm run deploy:local
#   docker compose exec hardhat npm run export:local
#   docker compose up -d web                     # serve the dApp on :8080

services:
  hardhat:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - ./:/app
      - hardhat_node_modules:/app/node_modules
    ports:
      - "8545:8545"
    command: npm run node
    stop_grace_period: 2s

  web:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./metadata:/srv/metadata:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

  # ---- Layer 3: indexer (Ponder) + its Postgres ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ponder
      POSTGRES_PASSWORD: ponder
      POSTGRES_DB: ponder
    volumes:
      - ponder_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ponder"]
      interval: 3s
      timeout: 3s
      retries: 10

  indexer:
    image: node:22-bookworm-slim
    working_dir: /app/indexer
    volumes:
      - ./indexer:/app/indexer
      - indexer_node_modules:/app/indexer/node_modules
    environment:
      DATABASE_URL: postgresql://ponder:ponder@postgres:5432/ponder
      DATABASE_SCHEMA: ponder
      PONDER_RPC_URL: http://hardhat:8545
    ports:
      - "42069:42069"
    command: npm run start
    depends_on:
      postgres:
        condition: service_healthy
      hardhat:
        condition: service_started

volumes:
  hardhat_node_modules:
  ponder_pg:
  indexer_node_modules:
